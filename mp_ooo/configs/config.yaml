# The top_tb testbench (and its corresponding configuration block)
# are what will be used for grading purposes.
# Values in the common_simulation block could be overwritten there.
# Go there now (line 36, by default).

common_simulation: &common_simulation
  clock_period: 1000 # In picoseconds
  timeout: 10000000
  builder: generic
  arch: rv32im

  vcs_config_enabled: true
  rvfi_enabled: false
  binary_compilation_enabled: false
  sram_compilation_enabled: false

common_synthesis: &common_synthesis
  syn_script: dc/synthesis.tcl
  constraint_file: constraints/default.sdc

  compile_ultra: false
  ungroup: false
  gate_clock: false
  retime: false
  min_power: false
  compile_iterations: 0

  power_script: dc/power.tcl
  scope: tb_wrapper/dut

  lint_awl: lint.awl
  lint_script: lint.tcl

  dv_script: dc/dv.tcl

top_tb:
  supported_targets: [compile, sim, audit, verdi, spike, covrep, syn, dv, lint, sram, power]
  sim: 
    <<: *common_simulation
    tb_name: top_tb
    clock_period: 10000
    builder: cpu
    commit_log_frequency: 200
    rvfi_enabled: true
    rvfi_channels: 1
    binary_compilation_enabled: true
    sram_compilation_enabled: true

    dw_ips: []
  syn:
    <<: *common_synthesis
    design_top: cpu

    compile_ultra: true
    ungroup: true
    gate_clock: true
